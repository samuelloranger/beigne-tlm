services:
  web:
    build:
      context: packages/web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  server:
    build:
      context: packages/server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/beigne.db

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "8556:8556"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server

volumes:
  db-data:
